<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password</title>
  <style>
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      background: #f4f1e8;
      color: #1b2a41;
    }
    .wrap {
      max-width: 520px;
      margin: 36px auto;
      padding: 20px;
    }
    .card {
      border: 1px solid #d8ccb6;
      border-radius: 12px;
      padding: 18px;
      background: #fffaf1;
    }
    h1 {
      margin-top: 0;
      color: #b84f2a;
    }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #bfae93;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    button {
      margin-top: 12px;
      background: #b84f2a;
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    #status {
      min-height: 20px;
      color: #5b6878;
    }
    a {
      color: #b84f2a;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Reset Password</h1>
      <form id="reset-form">
        <label for="token">Reset token</label>
        <input id="token" required />

        <label for="password">New password</label>
        <input id="password" type="password" autocomplete="new-password" minlength="8" required />

        <label for="confirm-password">Confirm new password</label>
        <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required />

        <button type="submit">Reset password</button>
      </form>
      <p id="status"></p>
      <p><a href="/login.html">Back to login</a></p>
    </section>
  </main>

  <script>
    const tokenInput = document.getElementById('token');
    const statusNode = document.getElementById('status');
    tokenInput.value = new URLSearchParams(window.location.search).get('token') || '';

    document.getElementById('reset-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      if (password !== confirmPassword) {
        statusNode.textContent = 'Passwords do not match.';
        return;
      }

      statusNode.textContent = 'Resetting password...';
      try {
        const response = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: tokenInput.value, password })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || 'Request failed');
        }
        statusNode.textContent = `${data.message}. You can now log in with the new password.`;
      } catch (error) {
        statusNode.textContent = error.message;
      }
    });
  </script>
</body>
</html>
