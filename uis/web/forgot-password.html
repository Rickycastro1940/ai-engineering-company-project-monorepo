<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>
  <style>
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      background: #f4f1e8;
      color: #1b2a41;
    }
    .wrap {
      max-width: 520px;
      margin: 36px auto;
      padding: 20px;
    }
    .card {
      border: 1px solid #d8ccb6;
      border-radius: 12px;
      padding: 18px;
      background: #fffaf1;
    }
    h1 {
      margin-top: 0;
      color: #b84f2a;
    }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #bfae93;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    button {
      margin-top: 12px;
      background: #b84f2a;
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    #status {
      min-height: 20px;
      color: #5b6878;
    }
    a {
      color: #b84f2a;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Forgot Password</h1>
      <p>Enter your account email and we will create a password reset link.</p>
      <form id="forgot-form">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />
        <button type="submit">Send reset link</button>
      </form>
      <p id="status"></p>
      <p><a href="/login.html">Back to login</a></p>
    </section>
  </main>

  <script>
    const statusNode = document.getElementById('status');

    document.getElementById('forgot-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      statusNode.textContent = 'Requesting reset link...';
      try {
        const response = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.detail || 'Request failed');
        }
        statusNode.textContent = data.message;
        if (data.reset_url) {
          const link = document.createElement('a');
          link.href = data.reset_url;
          link.textContent = 'Open reset page';
          statusNode.append(' ');
          statusNode.appendChild(link);
        }
      } catch (error) {
        statusNode.textContent = error.message;
      }
    });
  </script>
</body>
</html>
