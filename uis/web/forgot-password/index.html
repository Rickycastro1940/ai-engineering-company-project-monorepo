<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot your password?</title>
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Forgot your password?</h1>
      <p>Enter your account email and we'll send you a link to reset your password.</p>

      <form id="forgot-form" novalidate>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required />
        <button id="submit" type="submit">Send reset link</button>
      </form>

      <p id="confirmation" class="banner success" hidden></p>
      <p id="status" class="status"></p>
      <p class="links"><a href="/login">Back to log in</a></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('forgot-form');
    const submitButton = document.getElementById('submit');
    const emailInput = document.getElementById('email');
    const confirmation = document.getElementById('confirmation');
    const statusNode = document.getElementById('status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusNode.textContent = 'Sending...';
      statusNode.className = 'status';

      try {
        await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailInput.value }),
        });
      } catch (error) {
        // Intentionally ignored: the confirmation is shown regardless of result.
      }

      // Disable the form to prevent duplicate requests and always show the same
      // confirmation message (no information about whether the email exists).
      emailInput.disabled = true;
      submitButton.disabled = true;
      statusNode.textContent = '';
      confirmation.textContent = "If that address is registered, you'll receive a link shortly.";
      confirmation.hidden = false;
    });
  </script>
</body>
</html>
