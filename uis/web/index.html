<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Incident Analysis Web UI</title>
  <style>
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      background: #f4f1e8;
      color: #1b2a41;
    }
    .wrap {
      max-width: 860px;
      margin: 36px auto;
      padding: 20px;
    }
    .card {
      border: 1px solid #d8ccb6;
      border-radius: 12px;
      padding: 18px;
      background: #fffaf1;
    }
    h1 {
      margin-top: 0;
      color: #b84f2a;
    }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #bfae93;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    button {
      margin-top: 12px;
      background: #b84f2a;
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }
    .secondary-button {
      width: auto;
      min-width: 140px;
      margin-top: 8px;
      background: #1b2a41;
    }
    .upload-zone {
      margin-top: 12px;
      border: 2px dashed #bfae93;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      color: #5b6878;
      background: #fff;
    }
    .upload-zone.dragover {
      border-color: #b84f2a;
      background: #fff2ea;
      color: #1b2a41;
    }
    .summary {
      margin-top: 18px;
      display: none;
      border-top: 1px solid #d8ccb6;
      padding-top: 12px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .metric-card {
      border: 1px solid #d8ccb6;
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }
    .metric-card .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #5b6878;
      letter-spacing: 0.04em;
    }
    .metric-card .value {
      font-size: 1.2rem;
      font-weight: 700;
      margin-top: 4px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
      background: #fff;
    }
    th, td {
      border: 1px solid #d8ccb6;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f3e7d8;
    }
    #status {
      margin-top: 12px;
      min-height: 18px;
      color: #5b6878;
    }
    #status.error {
      color: #8f2d1c;
    }
    #status.success {
      color: #286140;
    }
    .spinner {
      display: inline-block;
      width: 0.9rem;
      height: 0.9rem;
      margin-right: 6px;
      border: 2px solid #d8ccb6;
      border-top-color: #b84f2a;
      border-radius: 50%;
      vertical-align: -2px;
      animation: spin 0.8s linear infinite;
    }
    .status-actions {
      min-height: 42px;
    }
    .hidden {
      display: none;
    }
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Incident Analysis</h1>
      <p>Upload or select a CSV, run analysis, visualize summary, and export CSV.</p>

      <label for="input">Input CSV path</label>
      <input id="input" value="scripts/incidents-COMPANY.csv" />

      <label for="output">Output CSV path</label>
      <input id="output" value="results.csv" />

      <label for="engine">Engine</label>
      <select id="engine">
        <option value="native">native</option>
        <option value="pandas">pandas</option>
      </select>

      <button id="run">Analyze and Download CSV</button>

      <div id="upload-zone" class="upload-zone" role="button" tabindex="0">
        Drop CSV file here or click to select
      </div>
      <input id="file-input" type="file" accept=".csv,text/csv" style="display:none" />
      <button id="upload-run" type="button">Upload CSV and Analyze</button>
      <button id="download-last" type="button">Download Last Results CSV</button>
      <p id="selected-file">No file selected.</p>
      <p id="status" role="status" aria-live="polite">Ready to analyze a CSV.</p>
      <div class="status-actions">
        <button id="status-action" class="secondary-button hidden" type="button"></button>
      </div>

      <section id="summary" class="summary">
        <h2>General Metrics</h2>
        <div id="general-metrics" class="summary-grid"></div>

        <h2>Category Breakdown</h2>
        <table>
          <thead><tr><th>Category</th><th>Count</th></tr></thead>
          <tbody id="category-breakdown"></tbody>
        </table>

        <h2>Satisfaction Index</h2>
        <div id="satisfaction-metrics" class="summary-grid"></div>
        <table>
          <thead><tr><th>Score</th><th>Count</th></tr></thead>
          <tbody id="satisfaction-breakdown"></tbody>
        </table>

        <button id="download-summary-csv" type="button">Download Results as CSV</button>
      </section>
    </section>
  </main>

  <script>
    const runButton = document.getElementById('run');
    const uploadButton = document.getElementById('upload-run');
    const downloadLastButton = document.getElementById('download-last');
    const downloadSummaryButton = document.getElementById('download-summary-csv');
    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const selectedFileNode = document.getElementById('selected-file');
    const statusNode = document.getElementById('status');
    const statusActionButton = document.getElementById('status-action');
    const summarySection = document.getElementById('summary');
    const generalMetricsNode = document.getElementById('general-metrics');
    const categoryBreakdownNode = document.getElementById('category-breakdown');
    const satisfactionMetricsNode = document.getElementById('satisfaction-metrics');
    const satisfactionBreakdownNode = document.getElementById('satisfaction-breakdown');

    let selectedFile = null;
    let lastOutputFile = '';

    const setButtonsDisabled = (disabled) => {
      [runButton, uploadButton, downloadLastButton, downloadSummaryButton].forEach((button) => {
        button.disabled = disabled;
      });
    };

    const setStatus = (state, message, actionLabel, actionHandler) => {
      statusNode.className = state === 'error' ? 'error' : state === 'success' ? 'success' : '';
      statusNode.innerHTML = '';
      if (state === 'loading') {
        const spinner = document.createElement('span');
        spinner.className = 'spinner';
        spinner.setAttribute('aria-hidden', 'true');
        statusNode.appendChild(spinner);
      }
      statusNode.appendChild(document.createTextNode(message));
      statusActionButton.classList.toggle('hidden', !actionLabel);
      statusActionButton.textContent = actionLabel || '';
      statusActionButton.onclick = actionHandler || null;
    };

    const friendlyDetail = (detail) => {
      if (Array.isArray(detail)) {
        return detail.map((item) => item?.msg || item?.type || 'Please check the highlighted input.').join(' ');
      }
      if (detail && typeof detail === 'object') {
        return detail.message || detail.detail || 'The server could not complete the request.';
      }
      return typeof detail === 'string' ? detail : '';
    };

    const humanizeError = (error, fallbackMessage) => {
      const rawMessage = error?.userMessage || error?.message || '';
      if (!rawMessage || /unexpected token|syntaxerror|error\s*\d{3}|internal server error/i.test(rawMessage)) {
        return fallbackMessage;
      }
      if (/input file not found/i.test(rawMessage)) {
        return 'We could not find the input CSV. Check the path and try again.';
      }
      return rawMessage
        .replace(/\/workspace\/([^\s]+)/g, '$1')
        .replace(/\/tmp\/[^\s]+/g, 'a temporary file');
    };

    const parseJsonResponse = async (response) => {
      try {
        return await response.json();
      } catch (error) {
        const friendly = new Error('The server returned a response the page could not read. Please try again.');
        friendly.cause = error;
        throw friendly;
      }
    };

    const readApiError = async (response, fallbackMessage) => {
      try {
        const payload = await response.json();
        const message = friendlyDetail(payload?.detail) || fallbackMessage;
        return new Error(message);
      } catch (error) {
        if (error instanceof SyntaxError) {
          return new Error(fallbackMessage);
        }
        return error;
      }
    };

    const downloadBlob = (blob, filename) => {
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = filename || 'results.csv';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    };

    const setSelectedFile = (file) => {
      selectedFile = file;
      selectedFileNode.textContent = file ? `Selected: ${file.name}` : 'No file selected.';
    };

    const clearSummary = () => {
      summarySection.style.display = 'none';
      generalMetricsNode.innerHTML = '';
      categoryBreakdownNode.innerHTML = '';
      satisfactionMetricsNode.innerHTML = '';
      satisfactionBreakdownNode.innerHTML = '';
    };

    const renderSummary = (payload) => {
      const metrics = payload?.general_metrics || {};
      generalMetricsNode.innerHTML = '';
      [['Total Processed', metrics.total_processed ?? 0], ['Valid Records', metrics.valid_records ?? 0], ['Invalid Records', metrics.invalid_records ?? 0]].forEach(([label, value]) => {
        const card = document.createElement('div');
        card.className = 'metric-card';
        const labelNode = document.createElement('div');
        labelNode.className = 'label';
        labelNode.textContent = label;
        const valueNode = document.createElement('div');
        valueNode.className = 'value';
        valueNode.textContent = String(value);
        card.append(labelNode, valueNode);
        generalMetricsNode.appendChild(card);
      });

      categoryBreakdownNode.innerHTML = '';
      Object.entries(payload?.category_breakdown || {}).sort((a, b) => a[0].localeCompare(b[0])).forEach(([category, count]) => {
        const row = document.createElement('tr');
        const categoryCell = document.createElement('td');
        categoryCell.textContent = category || 'Uncategorized';
        const countCell = document.createElement('td');
        countCell.textContent = String(count ?? 0);
        row.append(categoryCell, countCell);
        categoryBreakdownNode.appendChild(row);
      });

      const index = payload?.satisfaction_index || {};
      satisfactionMetricsNode.innerHTML = '';
      [['Scored Cases', index.scored_cases ?? 0], ['Average Score', Number(index.average_score ?? 0).toFixed(2)]].forEach(([label, value]) => {
        const card = document.createElement('div');
        card.className = 'metric-card';
        const labelNode = document.createElement('div');
        labelNode.className = 'label';
        labelNode.textContent = label;
        const valueNode = document.createElement('div');
        valueNode.className = 'value';
        valueNode.textContent = String(value);
        card.append(labelNode, valueNode);
        satisfactionMetricsNode.appendChild(card);
      });

      satisfactionBreakdownNode.innerHTML = '';
      Object.entries(index?.score_distribution || {}).forEach(([score, count]) => {
        const row = document.createElement('tr');
        const scoreCell = document.createElement('td');
        scoreCell.textContent = String(score ?? 'Unknown');
        const countCell = document.createElement('td');
        countCell.textContent = String(count ?? 0);
        row.append(scoreCell, countCell);
        satisfactionBreakdownNode.appendChild(row);
      });

      summarySection.style.display = 'block';
    };

    const fetchJson = async (url, options, fallbackMessage, networkMessage) => {
      let response;
      try {
        response = await fetch(url, options);
      } catch (error) {
        const friendly = new Error(networkMessage);
        friendly.cause = error;
        throw friendly;
      }
      if (!response.ok) {
        throw await readApiError(response, fallbackMessage);
      }
      return parseJsonResponse(response);
    };

    const downloadOutput = async (outputFile) => {
      const requestedOutput = outputFile || lastOutputFile || document.getElementById('output').value || 'results.csv';
      const encoded = encodeURIComponent(requestedOutput);
      let response;
      try {
        response = await fetch(`/api/incidents/results/export?output_file=${encoded}`);
      } catch (error) {
        const friendly = new Error('The results file could not be downloaded. Check your connection and try again.');
        friendly.cause = error;
        throw friendly;
      }
      if (!response.ok) {
        throw await readApiError(response, 'The results file is not available yet. Run analysis, then try downloading again.');
      }
      try {
        return await response.blob();
      } catch (error) {
        const friendly = new Error('The results file could not be read by the browser. Please retry the download.');
        friendly.cause = error;
        throw friendly;
      }
    };

    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        fileInput.click();
      }
    });
    uploadZone.addEventListener('dragover', (event) => {
      event.preventDefault();
      uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (event) => {
      event.preventDefault();
      uploadZone.classList.remove('dragover');
      const files = event.dataTransfer && event.dataTransfer.files;
      setSelectedFile(files && files.length ? files[0] : null);
    });
    fileInput.addEventListener('change', () => {
      setSelectedFile(fileInput.files && fileInput.files.length ? fileInput.files[0] : null);
    });

    runButton.addEventListener('click', async () => {
      const payload = {
        input_file: document.getElementById('input').value,
        output_file: document.getElementById('output').value,
        engine: document.getElementById('engine').value,
      };
      const retry = () => runButton.click();
      clearSummary();
      setStatus('loading', 'Running analysis...', '', null);
      setButtonsDisabled(true);
      try {
        const summary = await fetchJson(
          '/api/incidents/anylayze/summary',
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          },
          'The CSV could not be analyzed. Check the file path and try again.',
          'The analysis service could not be reached. Check your connection and try again.',
        );
        renderSummary(summary);
        lastOutputFile = summary?.output_file || payload.output_file || lastOutputFile;
        const blob = await downloadOutput(lastOutputFile);
        downloadBlob(blob, lastOutputFile.split('/').pop() || 'results.csv');
        setStatus('success', 'Analysis complete. CSV downloaded.', '', null);
      } catch (error) {
        const message = humanizeError(error, 'The CSV could not be analyzed. Check the file path and try again.');
        setStatus('error', `${message} You can retry after checking the CSV settings.`, 'Retry analysis', retry);
      } finally {
        setButtonsDisabled(false);
      }
    });

    uploadButton.addEventListener('click', async () => {
      if (!selectedFile) {
        setStatus('error', 'Please select a CSV file first. Use the upload area, then run the upload analysis again.', 'Select CSV', () => fileInput.click());
        return;
      }
      const retry = () => uploadButton.click();
      clearSummary();
      setStatus('loading', 'Uploading and analyzing CSV...', '', null);
      setButtonsDisabled(true);
      try {
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('output_file', document.getElementById('output').value || 'results.csv');
        formData.append('engine', document.getElementById('engine').value || 'native');

        const summary = await fetchJson(
          '/api/incidents/anylayze/upload/summary',
          {
            method: 'POST',
            body: formData,
          },
          'The uploaded CSV could not be analyzed. Choose a valid CSV and try again.',
          'The upload service could not be reached. Check your connection and try again.',
        );
        renderSummary(summary);
        lastOutputFile = summary?.output_file || document.getElementById('output').value || lastOutputFile;
        const blob = await downloadOutput(lastOutputFile);
        downloadBlob(blob, lastOutputFile.split('/').pop() || 'results.csv');
        setStatus('success', 'Upload analysis complete. CSV downloaded.', '', null);
      } catch (error) {
        const message = humanizeError(error, 'The uploaded CSV could not be analyzed. Choose a valid CSV and try again.');
        setStatus('error', `${message} You can retry with the selected file or choose another CSV.`, 'Retry upload', retry);
      } finally {
        setButtonsDisabled(false);
      }
    });

    const handleDownloadClick = async () => {
      const retry = () => handleDownloadClick();
      setStatus('loading', 'Downloading results CSV...', '', null);
      setButtonsDisabled(true);
      try {
        const blob = await downloadOutput();
        const currentOutput = lastOutputFile || document.getElementById('output').value || 'results.csv';
        const filename = currentOutput.split('/').pop() || 'results.csv';
        downloadBlob(blob, filename);
        setStatus('success', 'Results CSV downloaded.', '', null);
      } catch (error) {
        const message = humanizeError(error, 'The results file is not available yet. Run analysis, then try downloading again.');
        setStatus('error', `${message} Run analysis or retry the download.`, 'Retry download', retry);
      } finally {
        setButtonsDisabled(false);
      }
    };

    downloadLastButton.addEventListener('click', handleDownloadClick);
    downloadSummaryButton.addEventListener('click', handleDownloadClick);
  </script>
</body>
</html>
