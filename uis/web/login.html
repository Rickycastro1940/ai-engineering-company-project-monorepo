<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Account Login</title>
  <style>
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      background: #f4f1e8;
      color: #1b2a41;
    }
    .wrap {
      max-width: 520px;
      margin: 36px auto;
      padding: 20px;
    }
    .card {
      border: 1px solid #d8ccb6;
      border-radius: 12px;
      padding: 18px;
      background: #fffaf1;
      margin-bottom: 18px;
    }
    h1, h2 {
      margin-top: 0;
      color: #b84f2a;
    }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #bfae93;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    button {
      margin-top: 12px;
      background: #b84f2a;
      color: #fff;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }
    .status {
      min-height: 20px;
      color: #5b6878;
    }
    a {
      color: #b84f2a;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Account Login</h1>
      <form id="login-form">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="email" required />

        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" minlength="8" required />

        <button type="submit">Log in</button>
      </form>
      <p><a href="/forgot-password.html">Forgot your password?</a></p>
      <p id="login-status" class="status"></p>
    </section>

    <section class="card">
      <h2>Create a test account</h2>
      <form id="register-form">
        <label for="register-email">Email</label>
        <input id="register-email" type="email" autocomplete="email" required />

        <label for="register-password">Password</label>
        <input id="register-password" type="password" autocomplete="new-password" minlength="8" required />

        <button type="submit">Register</button>
      </form>
      <p id="register-status" class="status"></p>
    </section>
  </main>

  <script>
    const postJson = async (url, payload) => {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.detail || 'Request failed');
      }
      return data;
    };

    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const statusNode = document.getElementById('login-status');
      statusNode.textContent = 'Logging in...';
      try {
        const data = await postJson('/auth/login', {
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value
        });
        statusNode.textContent = `${data.message} as ${data.email}.`;
      } catch (error) {
        statusNode.textContent = error.message;
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const statusNode = document.getElementById('register-status');
      statusNode.textContent = 'Creating account...';
      try {
        const data = await postJson('/auth/register', {
          email: document.getElementById('register-email').value,
          password: document.getElementById('register-password').value
        });
        statusNode.textContent = `${data.message}: ${data.email}.`;
      } catch (error) {
        statusNode.textContent = error.message;
      }
    });
  </script>
</body>
</html>
